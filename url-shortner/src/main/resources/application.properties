spring.application.name=url-shortner

#Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/urlshortner?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#jpa/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect



spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Set time-to-live for cache (e.g., 1 day)
spring.cache.redis.time-to-live=86400000


# Expose health and metrics endpoints over HTTP
management.endpoints.web.exposure.include=health,metrics

# Show detailed health information (including DB status)
management.endpoint.health.show-details=always

# Enable specific metrics
management.endpoint.metrics.enabled=true